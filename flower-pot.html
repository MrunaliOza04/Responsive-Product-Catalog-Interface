<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Flower Pot | Amogh Enterprises</title>

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#0f0f0f;
            color:white;
        }

        .top-ribbon{

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:15px 40px;

            background:linear-gradient(
                to right,
                #c71585,
                #ff1493
            );

            position:sticky;

            top:0;

            z-index:1000;
        }

        .ribbon-logo{

            display:flex;

            align-items:center;

            gap:15px;

            color:white;

            font-size:28px;

            font-weight:bold;
        }

        .ribbon-logo img{
            height:60px;
        }

        .home-btn{

            text-decoration:none;

            color:white;

            font-size:20px;

            font-weight:bold;

            padding:15px 35px;

            border-radius:35px;

            background:rgba(255,255,255,0.15);
        }

        .product-container{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:60px;

    padding:80px 50px;

    flex-wrap:wrap;
}

.product-image img{

    width:450px;

    border-radius:20px;

    box-shadow:0 0 40px rgba(255,20,147,0.5);

    transition:0.4s;
}

.product-image img:hover{

    transform:scale(1.05);
}

.product-details{

    max-width:500px;
}

.product-details h1{

    color:#ff1493;

    font-size:50px;

    margin-bottom:20px;
}

.product-details p{

    font-size:20px;

    line-height:1.8;
}

.product-details h3{

    color:#ff1493;

    margin-top:30px;
}

.product-details ul{

    line-height:2;
}

.whatsapp-inquiry{

    display:inline-block;

    margin-top:30px;

    padding:15px 35px;

    border-radius:35px;

    background:linear-gradient(to right,#ff1493,#ff69b4);

    color:white;

    text-decoration:none;

    font-weight:bold;

    transition:0.4s;
}

select,
input{

    width:220px;

    padding:12px;

    border-radius:10px;

    border:none;

    margin-top:10px;

    font-size:18px;
}

#price,
#totalPrice{

    color:#ff1493;

    font-size:28px;

    font-weight:bold;
}

.quantity-box{

    display:flex;

    align-items:center;

    gap:20px;

    margin-top:15px;
}

.quantity-box button{

    width:45px;

    height:45px;

    border:none;

    border-radius:50%;

    background:#ff1493;

    color:white;

    font-size:24px;

    cursor:pointer;

    transition:0.3s;
}

.quantity-box button:hover{

    transform:scale(1.1);

    box-shadow:0 0 15px #ff1493;
}

#quantity{

    font-size:28px;

    font-weight:bold;

    min-width:40px;

    text-align:center;
}

.action-buttons{

    display:flex;

    gap:20px;

    flex-wrap:wrap;

    margin-top:30px;
}

.buy-now-btn{

    text-decoration:none;

    padding:15px 35px;

    border-radius:35px;

    background:#ff1493;

    color:white;

    font-weight:bold;

    transition:0.3s;
}

.buy-now-btn:hover{

    transform:scale(1.05);

    box-shadow:0 0 20px #ff1493;
}

.whatsapp-inquiry:hover{

    transform:scale(1.08);
}

    </style>

</head>

<body>

<div class="top-ribbon">

    <div class="ribbon-logo">

        <img src="images/amogh-logo.png" alt="Amogh Enterprises">

        <span>Amogh Enterprises</span>

    </div>

    <a href="sp-homes.html" class="home-btn">
        ← Back
    </a>

</div>


<section class="product-container">

    <div class="product-image">

        <img src="images/products/Flower Pot.png" alt="Flower Pot">

    </div>

    <div class="product-details">

        <h1>Flower Pot</h1>

        <p>
        <p>
            High-quality and durable flower pots suitable
            for home gardens, balconies, terraces and
            decorative landscaping. Available in multiple
            sizes to meet different gardening needs.
        </p>
        <h3>Select Size</h3>

        <select id="sizeSelect" onchange="updatePrice()">

            <option value="50">6 Inch</option>

            <option value="70">8 Inch</option>

            <option value="90">10 Inch</option>

            <option value="120">12 Inch</option>

            <option value="150">14 Inch</option>

            <option value="180">16 Inch</option>

        </select>

        <h3>Price</h3>

        <p id="price">
            ₹50
        </p>

        <h3>Quantity</h3>

        <div class="quantity-box">

            <button onclick="decreaseQty()">
                -
            </button>

            <span id="quantity">
        1
    </span>

            <button onclick="increaseQty()">
                +
            </button>

        </div>

        <h3>Total Price</h3>

        <p id="totalPrice">
            ₹50
        </p>

        <div class="action-buttons">

            <a href="order.html" class="buy-now-btn">
                Buy Now
            </a>

            <a href="https://wa.me/917796029571"
               class="whatsapp-inquiry">
                WhatsApp Inquiry
            </a>

        </div>

    </div>

</section>

<script>

    let quantity = 1;

    function increaseQty(){

        quantity++;

        updatePrice();
    }

    function decreaseQty(){

        if(quantity > 1){

            quantity--;

            updatePrice();
        }
    }

    function updatePrice(){

        let sizePrice =
            parseInt(
                document.getElementById("sizeSelect").value
            );

        document.getElementById("quantity").innerHTML =
            quantity;

        document.getElementById("price").innerHTML =
            "₹" + sizePrice;

        document.getElementById("totalPrice").innerHTML =
            "₹" + (sizePrice * quantity);
    }

</script>

</body>

</html>
